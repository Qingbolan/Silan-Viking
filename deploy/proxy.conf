# deploy/proxy.conf — the `proxy` service: public entry, routes /api to the
# backend and everything else to the web service. TLS is intentionally left
# to the deployment host (a real cert via certbot, or a managed LB); this
# config is the HTTP-level routing the e2e Docker stack needs.
map $http_origin $silan_cors_origin {
    default "";
    "https://silan.tech" $http_origin;
    "https://www.silan.tech" $http_origin;
    "https://www.comp.nus.edu.sg" $http_origin;
    "https://comp.nus.edu.sg" $http_origin;
    "http://localhost:3000" $http_origin;
    "http://localhost:3001" $http_origin;
    "http://localhost:4185" $http_origin;
    "http://localhost:4191" $http_origin;
    "http://localhost:5173" $http_origin;
    "http://127.0.0.1:3000" $http_origin;
    "http://127.0.0.1:3001" $http_origin;
    "http://127.0.0.1:4185" $http_origin;
    "http://127.0.0.1:4191" $http_origin;
    "http://127.0.0.1:5173" $http_origin;
}

server {
    listen 80;
    server_name _;

    # API requests go to the Go backend. The /api prefix is stripped because
    # the backend registers routes at /api/v1/... already — keep the prefix.
    location /api/ {
        add_header Access-Control-Allow-Origin $silan_cors_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, Accept, Origin, X-Requested-With" always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Type" always;
        add_header Access-Control-Max-Age "86400" always;
        add_header Vary "Origin" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        proxy_pass http://backend:5200;
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Expose-Headers;
        proxy_hide_header Access-Control-Max-Age;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else is the static site.
    location / {
        proxy_pass http://web:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
