# deploy/docker-compose.yml — the three-service production stack (06 §6.5).
#
#   backend — Go API + persistent portfolio.db (derived tables + runtime data)
#   web     — static front-end bundle + SEO crawler artifacts
#   proxy   — public entry, routes /api -> backend, everything else -> web
#
# The derived database is a NAMED VOLUME (`portfolio-db`). It persists across
# deploys: `silan site deploy` promote replaces only the derived tables and
# leaves runtime tables (comment / content_interaction / annotation) intact
# (08 §8.3). Never bind-mount a fresh local portfolio.db over this volume.
#
# Usage on the server:
#   docker compose -f deploy/docker-compose.yml up -d --build

services:
  backend:
    build:
      context: ..
      dockerfile: deploy/backend.Dockerfile
    image: silan-backend:latest
    restart: unless-stopped
    volumes:
      # The derived DB (`/data/portfolio.db`) and the binary resource files
      # (`/data/media/`) both live here. The deploy pipeline's promote step
      # writes the db and its media-sync step mirrors the media tree into
      # this volume; both survive image rebuilds. The backend serves
      # `/data/media` via the `/api/v1/media` route (see config `MediaRoot`).
      - portfolio-db:/data
    expose:
      - "5200"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5200/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    build:
      context: ..
      dockerfile: deploy/web.Dockerfile
    image: silan-web:latest
    restart: unless-stopped
    expose:
      - "80"

  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - backend
      - web
    ports:
      - "8080:80"
    volumes:
      - ./proxy.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  portfolio-db:
