# deploy/nginx.conf — the `web` service: serve the SPA + SEO artifacts.
# The `proxy` service terminates TLS and routes /api to the backend; this
# inner nginx only serves static files and falls back to index.html for the
# client-side router.
server {
    listen 80;
    server_name _;
    absolute_redirect off;
    root /usr/share/nginx/html;
    index index.html;

    # Crawler artifacts are real files — serve them directly, no SPA fallback.
    location = /sitemap.xml { try_files $uri =404; }
    location = /robots.txt { try_files $uri =404; }
    location = /site-index.jsonld { try_files $uri =404; }

    # Hashed assets get a long cache; HTML stays fresh.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
