[package]
name = "silan-desktop"
version = "1.0.0"
edition = "2021"
rust-version = "1.95"
authors = ["Silan.Hu <silan.hu@u.nus.edu>"]
license = "MIT"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
rusqlite = { version = "0.32", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
silan-viking-app = { path = "../../engine/crates/silan-viking-app" }
tauri = { version = "2", features = [] }

[dev-dependencies]
tempfile = "3"
