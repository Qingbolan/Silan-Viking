# L2.5 entities — the sea-orm Entity layer.
#
# Final state: reverse-generated by `sea-orm-cli` from the Go ent tables after
# M0.5a (milestone M4). During M1-M6, M0.5a has not landed, so this crate only
# exports a schema-version anchor; the concrete `*Row` structs that the M6
# Mapper produces live next to the mapper in `silan-viking-app::sync::rows`
# (their coupling to the mapper is tighter than to the schema until the
# sea-orm Entities are generated).
[package]
name = "silan-viking-entities"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true

[dependencies]
serde = { workspace = true }
sea-orm = { workspace = true }
rust_decimal = { workspace = true }
