# engine/ — the Cargo workspace for the silan-viking Rust engine.
#
# This is the workspace ROOT; it is not itself a crate (no [package] section).
# It holds 7 member crates that map 1:1 onto the four-layer architecture
# (see docs/silan-viking/01-oop结构.md §1.9):
#   L1   base     — pure utilities, zero silan-viking dependencies
#   L2   content  — domain data, depends only on base
#   L2.5 entities — sea-orm Entities, reverse-generated from the Go ent tables
#   L3   app      — behaviour (parser/mapper/sink), depends on base+content+entities
#   L4   cli/mcp/site — outward-facing adapters
#
# The crate dependency graph is strictly one-directional (cargo enforces no
# back-edges at compile time):
#   cli ┐
#   mcp ┼─▶ app ─▶ entities ─┐
#   site┘      └─▶ content ──┼─▶ base
[workspace]
resolver = "2"
members = [
    "crates/silan-viking-base",
    "crates/silan-viking-content",
    "crates/silan-viking-entities",
    "crates/silan-viking-app",
    "crates/silan-viking-cli",
    "crates/silan-viking-mcp",
    "crates/silan-viking-site",
]

# Dependency versions shared across crates are declared here once; member
# crates inherit them with `workspace = true`.
[workspace.package]
version = "1.0.0"
edition = "2021"
rust-version = "1.95"
authors = ["Silan.Hu <silan.hu@u.nus.edu>"]
license = "MIT"

[workspace.dependencies]
# -- internal crates --
silan-viking-base     = { path = "crates/silan-viking-base" }
silan-viking-content  = { path = "crates/silan-viking-content" }
silan-viking-entities = { path = "crates/silan-viking-entities" }
silan-viking-app      = { path = "crates/silan-viking-app" }
silan-viking-mcp      = { path = "crates/silan-viking-mcp" }
silan-viking-site     = { path = "crates/silan-viking-site" }
# -- third-party --
thiserror   = "2"
ulid        = "1"
time        = { version = "0.3", features = ["macros", "parsing", "formatting"] }
serde       = { version = "1", features = ["derive"] }
serde_json  = "1"
base64      = "0.22"
toml        = "0.8"
serde_yaml  = "0.9"
rusqlite    = { version = "0.32", features = ["bundled"] }
tracing     = "0.1"
# ureq is a small blocking HTTP client — no async runtime, matching the
# engine's runtime-free discipline. Used by the stats sync to call the Go API.
ureq        = { version = "2.10", features = ["json"] }
rpassword   = "7"
dotenvy     = "0.15"
url         = "2"
flate2      = "1"
tar         = "0.4"
sha2        = "0.10"
# Used by `site update-content` (and `site deploy --what=content`) to verify
# the remote DB is byte-identical to what we just scp'd — scp can silently
# fail against a mmap'd file while reporting success, and only a content
# hash catches that. md5 is enough: this is integrity, not security.
md5         = "0.7"
# sea-orm provides only the Entity derives for the L2.5 `entities` crate
# (reverse-generated by sea-orm-cli, M4). No async runtime / DB driver is
# pulled in — the L3 `SqliteSink` writes via `rusqlite`, not sea-orm.
sea-orm     = { version = "1.1", default-features = false, features = ["macros", "with-uuid", "with-chrono", "with-rust_decimal"] }
# rust_decimal with `serde` so the reverse-generated entities (which derive
# serde for decimal columns like idea_details.estimated_budget) compile.
rust_decimal = { version = "1.41", features = ["serde"] }

[profile.release]
lto = true
codegen-units = 1
