# silan-viking.toml — project config (per docs/silan-viking/06 §6.2.2).
# Required sections: [project], [database]. [deploy] is needed only
# for `silan site deploy`; [identity]/[mcp] may be omitted.

[project]
name        = "silan-personal-website"
content_dir = "content"

[identity]
# Seeds content/resources/resume/parts/summary/en.md on `init`;
# after that, edit that file — it is the truth source, this is not.
full_name = "Silan Hu"
title     = "Emerging AI Systems Researcher & Full Stack Engineer"
email     = "Silan.Hu@u.nus.edu"
location  = "Singapore / Beijing, China"

[database]
path = "_deploy/api/portfolio.db"

[mcp]
port          = 7700
enable_deploy = false

[desktop.moments]
profile_alignment = "right"
background_image = "resources/resume/assets/nus-computing-cover.png"
background_position = "center 42%"
cover_height_px = 420

[deploy]
# mode = "nginx" routes through systemd + a host-managed nginx (BaoTa /
# 宝塔 here). Use mode = "docker" for the v1.0.0 Docker-Compose path.
mode         = "nginx"
host         = "107.174.92.163"
user         = "root"
ssh_key_path = "~/.ssh/id_rsa"
remote_dir   = "/www/wwwroot/silan.tech"
public_url   = "https://silan.tech"
backend_port = 5200
systemd_unit = "silan-backend"
